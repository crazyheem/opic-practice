<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OPIc 인프라영어">
<meta name="theme-color" content="#0A0F1E">
<title>OPIc 오디오북</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Sora:wght@600;700;800&display=swap');

:root {
  --bg: #0A0F1E;
  --card: #111827;
  --card2: #1a2235;
  --border: #1F2D45;
  --accent: #3B82F6;
  --accent2: #60A5FA;
  --green: #10B981;
  --amber: #F59E0B;
  --purple: #8B5CF6;
  --text: #F1F5F9;
  --text2: #94A3B8;
  --text3: #475569;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; height: -webkit-fill-available;
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  overflow: hidden; -webkit-font-smoothing: antialiased;
}

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; height: 100%; height: -webkit-fill-available; }
.screen.active { display: flex; }

/* ════════════════════════════
   SCREEN 1: PLAYLIST
════════════════════════════ */
.pl-header {
  padding: calc(var(--sat) + 18px) 20px 14px;
  background: linear-gradient(170deg, #0d1929 0%, #0A0F1E 100%);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.pl-top { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.pl-icon {
  width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
  background: linear-gradient(135deg, #1D4ED8, #7C3AED);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.pl-title { font-family: 'Sora', sans-serif; font-size: 19px; font-weight: 800; color: #fff; }
.pl-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.pl-total { margin-left: auto; font-size: 12px; color: var(--text3); }

.pl-scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 10px 14px calc(var(--sab) + 16px);
}

.cat-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase;
  color: var(--text3); padding: 16px 4px 8px; display: flex; align-items: center; gap: 8px;
}
.cat-label span { font-size: 15px; }

.track-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 13px 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all 0.15s; -webkit-user-select: none;
}
.track-card:active { transform: scale(0.97); background: var(--card2); }
.track-card.playing { border-color: var(--accent); background: rgba(59,130,246,0.06); }

.track-num {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; font-family: 'Sora', sans-serif;
}
.track-info { flex: 1; min-width: 0; }
.track-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-desc { font-size: 11px; color: var(--text3); margin-top: 3px; }
.track-count { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.track-play-icon { font-size: 18px; flex-shrink: 0; }

/* ════════════════════════════
   SCREEN 2: PLAYER
════════════════════════════ */
.player-wrap {
  flex: 1; display: flex; flex-direction: column;
  padding: calc(var(--sat) + 14px) 20px calc(var(--sab) + 16px);
  overflow: hidden;
}

/* Back + title */
.player-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-shrink: 0; }
.back-btn {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; -webkit-user-select: none;
}
.back-btn:active { opacity: 0.6; }
.player-nav-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; color: #fff; flex:1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Album art area */
.album-art {
  flex-shrink: 0;
  width: 100%; aspect-ratio: 1;
  max-height: 220px; max-width: 220px;
  align-self: center;
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 72px;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.album-art.playing { animation: pulse 2.5s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0.3); }
  50% { transform: scale(1.02); box-shadow: 0 0 0 16px rgba(59,130,246,0); }
}

/* Track info */
.now-playing { text-align: center; margin-bottom: 16px; flex-shrink: 0; }
.now-track { font-family: 'Sora', sans-serif; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.now-index { font-size: 12px; color: var(--text3); }

/* Lyric card (scrollable) */
.lyric-card {
  flex: 1; min-height: 0;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 16px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  margin-bottom: 16px;
}
.lyric-line {
  padding: 8px 10px; border-radius: 10px; margin-bottom: 4px;
  font-size: 14px; line-height: 1.7; transition: all 0.3s;
}
.lyric-line.kr { font-size: 12px; color: var(--text3); padding-bottom: 2px; }
.lyric-line.en { color: var(--text2); }
.lyric-line.en.active {
  background: rgba(59,130,246,0.12);
  border-left: 3px solid var(--accent);
  color: #fff; padding-left: 13px;
}
.lyric-line.kr.active { color: var(--accent2); }

/* Progress */
.progress-wrap { flex-shrink: 0; margin-bottom: 14px; }
.progress-track {
  width: 100%; height: 4px; background: var(--border); border-radius: 2px;
  overflow: hidden; margin-bottom: 6px;
}
.progress-fill-bar {
  height: 100%; background: linear-gradient(90deg, var(--accent), #A78BFA);
  border-radius: 2px; transition: width 0.3s;
}
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); }

/* Controls */
.controls { flex-shrink: 0; }
.ctrl-main { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 12px; }
.ctrl-btn {
  width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 22px;
  background: var(--card); color: var(--text2); border: 1px solid var(--border);
  -webkit-user-select: none; transition: all 0.15s;
}
.ctrl-btn:active { transform: scale(0.92); opacity: 0.8; }
.ctrl-btn.play-btn {
  width: 68px; height: 68px; font-size: 28px;
  background: linear-gradient(135deg, var(--accent), #7C3AED);
  color: #fff; border: none;
  box-shadow: 0 6px 24px rgba(59,130,246,0.4);
}
.ctrl-btn.play-btn:active { transform: scale(0.94); }

.ctrl-secondary { display: flex; gap: 8px; }
.ctrl-s-btn {
  flex: 1; padding: 9px 6px; border-radius: 10px; border: none; cursor: pointer;
  font-size: 11px; font-weight: 700; text-align: center;
  background: var(--card); color: var(--text2); border: 1px solid var(--border);
  -webkit-user-select: none; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.ctrl-s-btn:active { opacity: 0.7; }
.ctrl-s-btn.active { background: rgba(59,130,246,0.15); color: var(--accent2); border-color: rgba(59,130,246,0.3); }

/* Speed badge */
.speed-badge {
  display: inline-block; background: rgba(245,158,11,0.15);
  border: 1px solid rgba(245,158,11,0.3); color: #FCD34D;
  font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
  cursor: pointer; -webkit-user-select: none;
}

/* scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ════════════════════════════
     SCREEN 1: PLAYLIST
════════════════════════════ -->
<div class="screen active" id="screen-playlist">
  <div class="pl-header">
    <div class="pl-top">
      <div class="pl-icon">🎧</div>
      <div>
        <div class="pl-title">OPIc 오디오북</div>
        <div class="pl-sub">숙어 · IT실무 · 인프라 · 인터뷰 · 따라말하기</div>
      </div>
      <div class="pl-total" id="totalCount"></div>
    </div>
  </div>
  <div class="pl-scroll" id="playlistContainer"></div>
</div>

<!-- ════════════════════════════
     SCREEN 2: PLAYER
════════════════════════════ -->
<div class="screen" id="screen-player" style="position:relative;">
  <div class="player-wrap">
    <div class="player-nav">
      <div class="back-btn" onclick="goBack()">‹</div>
      <div class="player-nav-title" id="playerNavTitle"></div>
      <div class="speed-badge" id="speedBadge" onclick="cycleSpeed()">1.0x</div>
    </div>

    <div class="album-art" id="albumArt"></div>

    <div class="now-playing">
      <div class="now-track" id="nowTrack">로딩 중...</div>
      <div class="now-index" id="nowIndex"></div>
    </div>

    <div class="lyric-card" id="lyricCard"></div>

    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill-bar" id="progressBar" style="width:0%"></div></div>
      <div class="progress-labels"><span id="timeElapsed">0:00</span><span id="timeTotal">0:00</span></div>
    </div>

    <div class="controls">
      <div class="ctrl-main">
        <button class="ctrl-btn" onclick="prevItem()" title="이전">⏮</button>
        <button class="ctrl-btn" onclick="rewind()" title="10초 뒤로">↩10</button>
        <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextItem()" title="다음">⏭</button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="반복">🔁</button>
      </div>
      <div class="ctrl-secondary">
        <button class="ctrl-s-btn" id="autoBtn" onclick="toggleAuto()">⏯ 자동재생</button>
        <button class="ctrl-s-btn" id="shadowBtn" onclick="toggleShadow()">🎙 따라말하기</button>
        <button class="ctrl-s-btn" id="enOnlyBtn" onclick="toggleEnOnly()">🇺🇸 영어만</button>
        <button class="ctrl-s-btn" onclick="restartTrack()">🔄 처음부터</button>
      </div>
    </div>
  </div>

  <!-- 따라말하기 카운트다운 오버레이 -->
  <div id="shadowOverlay" style="display:none;position:absolute;bottom:0;left:0;right:0;
    background:linear-gradient(to top,rgba(10,15,30,0.98),rgba(10,15,30,0.7));
    padding:20px 20px calc(env(safe-area-inset-bottom,0px)+200px);
    flex-direction:column;align-items:center;gap:12px;z-index:100;">
    <div id="shadowLbl" style="font-size:15px;font-weight:700;color:#60A5FA;text-align:center;">🎙 지금 따라 말해보세요!</div>
    <div style="width:100%;height:6px;background:#1F2D45;border-radius:3px;overflow:hidden;">
      <div id="shadowBar" style="height:100%;width:100%;background:linear-gradient(90deg,#3B82F6,#8B5CF6);border-radius:3px;"></div>
    </div>
    <div style="font-size:12px;color:#475569;">영어 문장을 소리내어 따라해보세요 — 운전 중엔 마음속으로!</div>
  </div>
</div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let curTrack   = 0;
let curItem    = 0;
let isPlaying  = false;
let isAuto     = true;
let isRepeat   = false;
let isEnOnly   = false;
let isShadow   = false;  // 따라말하기 모드
let speed      = 1.0;
let utterance  = null;
let synth      = window.speechSynthesis;
let startTime  = null;
let timerInterval = null;

const SPEEDS = [0.8, 1.0, 1.2, 1.5];
let speedIdx = 1;

// ═══════════════════════════════════════════════════
// BUILD PLAYLIST UI
// ═══════════════════════════════════════════════════
function buildPlaylist() {
  const container = document.getElementById('playlistContainer');
  const cats = {};
  TRACKS.forEach((t, i) => {
    if (!cats[t.category]) cats[t.category] = [];
    cats[t.category].push({ ...t, idx: i });
  });

  let totalItems = 0;
  TRACKS.forEach(t => totalItems += t.items.length);
  document.getElementById('totalCount').textContent = `총 ${totalItems}개 항목`;

  const colors = [
    ['#1D4ED8','#7C3AED'], ['#0F766E','#0EA5E9'], ['#B45309','#D97706'],
    ['#7C3AED','#EC4899'], ['#DC2626','#EA580C'], ['#065F46','#0D9488'],
    ['#4F46E5','#7C3AED'], ['#1E40AF','#0EA5E9'], ['#7C2D12','#EA580C'],
    ['#6D28D9','#A855F7'], ['#065F46','#10B981'], ['#0C4A6E','#0EA5E9'],
    ['#1E3A5F','#3B82F6'], ['#7C2D12','#F59E0B'], ['#7C2D12','#DC2626'], ['#1F2937','#6B7280']
  ];

  Object.entries(cats).forEach(([cat, tracks]) => {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.innerHTML = `<span>${cat.split(' ')[0]}</span> ${cat.split(' ').slice(1).join(' ')}`;
    container.appendChild(lbl);

    tracks.forEach((t) => {
      const card = document.createElement('div');
      card.className = 'track-card';
      card.id = `track-card-${t.idx}`;
      const c = t.color || colors[t.idx % colors.length];
      card.innerHTML = `
        <div class="track-num" style="background:linear-gradient(135deg,${c[0]},${c[1]});color:#fff">${t.emoji}</div>
        <div class="track-info">
          <div class="track-title">${t.title}</div>
          <div class="track-desc">${t.items.length}개 항목</div>
        </div>
        <div class="track-count">${t.items.length}개</div>
        <div class="track-play-icon">›</div>`;
      card.onclick = () => openTrack(t.idx);
      container.appendChild(card);
    });
  });
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function openTrack(idx) {
  stopSpeech();
  curTrack = idx;
  curItem = 0;
  showScreen('screen-player');
  updatePlayerUI();
  renderLyrics();
  if (isAuto) startPlayback();
}

function goBack() {
  stopSpeech();
  isPlaying = false;
  updatePlayBtn();
  showScreen('screen-playlist');
  // highlight playing track
  document.querySelectorAll('.track-card').forEach((c,i) => c.classList.toggle('playing', i === curTrack));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════
// PLAYER UI
// ═══════════════════════════════════════════════════
function updatePlayerUI() {
  const t = TRACKS[curTrack];
  document.getElementById('playerNavTitle').textContent = t.title;
  document.getElementById('nowTrack').textContent = t.title;
  document.getElementById('nowIndex').textContent =
    `${curItem + 1} / ${t.items.length} — ${t.category}`;

  // Album art
  const art = document.getElementById('albumArt');
  const c = t.color;
  art.style.background = `linear-gradient(135deg, ${c[0]}, ${c[1]})`;
  art.textContent = t.emoji;
  art.classList.toggle('playing', isPlaying);

  // Progress
  const pct = t.items.length > 1 ? (curItem / (t.items.length - 1)) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('timeElapsed').textContent = `${curItem + 1}`;
  document.getElementById('timeTotal').textContent = `${t.items.length}`;
}

function renderLyrics() {
  const t = TRACKS[curTrack];
  const card = document.getElementById('lyricCard');
  card.innerHTML = t.items.map((item, i) => {
    const isActive = i === curItem;
    const krClass  = `lyric-line kr${isActive ? ' active' : ''}`;
    const enClass  = `lyric-line en${isActive ? ' active' : ''}`;
    if (item.kr) {
      return `<div class="${krClass}" id="lk-${i}">${item.kr}</div>
              <div class="${enClass}" id="le-${i}">${item.en}${item.ex && item.ex !== item.en ? `<br><span style="font-size:12px;color:#475569;font-style:italic">${item.ex}</span>` : ''}</div>`;
    }
    return `<div class="${enClass}" id="le-${i}">${item.en}</div>`;
  }).join('');
  scrollToActive();
}

function scrollToActive() {
  const el = document.getElementById(`le-${curItem}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updatePlayBtn() {
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('albumArt').classList.toggle('playing', isPlaying);
}

// ═══════════════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════════════
function speak(text, lang, onEnd) {
  stopSpeech();
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang;
  utterance.rate = speed;
  utterance.pitch = 1.0;
  utterance.onend = onEnd;
  utterance.onerror = () => { if (onEnd) onEnd(); };
  synth.speak(utterance);
}

function stopSpeech() {
  synth.cancel();
  utterance = null;
}

function startPlayback() {
  if (!synth) return;
  isPlaying = true;
  updatePlayBtn();
  speakCurrent();
}

// 문장 길이에 따라 따라말하기 쉬는 시간 자동 계산
function calcPauseMs(text) {
  const words = text.trim().split(/\s+/).length;
  if (words <= 6)  return 2000;
  if (words <= 12) return 3000;
  if (words <= 18) return 4000;
  return 5000;
}

// 따라말하기 카운트다운 오버레이 표시
function showCountdown(ms, onDone) {
  const el = document.getElementById('shadowOverlay');
  if (!el) { onDone(); return; }
  el.style.display = 'flex';
  const bar = document.getElementById('shadowBar');
  const lbl = document.getElementById('shadowLbl');
  lbl.textContent = '🎙 지금 따라 말해보세요!';
  bar.style.transition = 'none';
  bar.style.width = '100%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${ms}ms linear`;
      bar.style.width = '0%';
    });
  });
  const secs = Math.ceil(ms / 1000);
  let remaining = secs;
  const tick = setInterval(() => {
    remaining--;
    lbl.textContent = remaining > 0 ? `🎙 따라 말해보세요! (${remaining}초)` : '✅ 다음으로 넘어갑니다...';
    if (remaining <= 0) { clearInterval(tick); }
  }, 1000);
  setTimeout(() => {
    el.style.display = 'none';
    clearInterval(tick);
    onDone();
  }, ms);
}

function speakCurrent() {
  const t = TRACKS[curTrack];
  const item = t.items[curItem];
  updatePlayerUI();
  renderLyrics();

  if (isShadow) {
    // 따라말하기 모드: 한국어 → 영어 → [쉬고] → 영어 반복
    const krText = item.kr || '';
    const pause = calcPauseMs(item.en);
    const doShadow = () => {
      // 영어 먼저 읽기
      speak(item.en, 'en-US', () => {
        // 쉬는 시간 (따라말하기)
        setTimeout(() => {
          showCountdown(pause, () => {
            // 영어 한 번 더
            speak(item.en, 'en-US', afterItem);
          });
        }, 300);
      });
    };
    if (krText) {
      speak(krText, 'ko-KR', () => setTimeout(doShadow, 350));
    } else {
      doShadow();
    }
  } else if (isEnOnly) {
    // 영어만 읽기
    speak(item.en, 'en-US', () => {
      if (item.ex && item.ex !== item.en) {
        setTimeout(() => speak(item.ex, 'en-US', afterItem), 400);
      } else {
        afterItem();
      }
    });
  } else {
    // 기본: 한국어 설명 → 영어
    const krText = item.kr || '';
    if (krText) {
      speak(krText, 'ko-KR', () => {
        setTimeout(() => {
          speak(item.en, 'en-US', () => {
            if (item.ex && item.ex !== item.en) {
              setTimeout(() => speak(item.ex, 'en-US', afterItem), 500);
            } else {
              afterItem();
            }
          });
        }, 350);
      });
    } else {
      speak(item.en, 'en-US', afterItem);
    }
  }
}

function afterItem() {
  if (!isPlaying) return;
  const t = TRACKS[curTrack];
  if (curItem < t.items.length - 1) {
    curItem++;
    setTimeout(speakCurrent, isEnOnly ? 600 : 800);
  } else {
    // 트랙 끝
    if (isRepeat) {
      curItem = 0;
      setTimeout(speakCurrent, 1000);
    } else if (isAuto && curTrack < TRACKS.length - 1) {
      curTrack++;
      curItem = 0;
      setTimeout(speakCurrent, 1200);
    } else {
      isPlaying = false;
      updatePlayBtn();
    }
  }
}

// ═══════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════
function togglePlay() {
  if (isPlaying) {
    stopSpeech();
    isPlaying = false;
    updatePlayBtn();
  } else {
    startPlayback();
  }
}

function nextItem() {
  const t = TRACKS[curTrack];
  stopSpeech();
  if (curItem < t.items.length - 1) {
    curItem++;
  } else if (curTrack < TRACKS.length - 1) {
    curTrack++; curItem = 0;
  }
  updatePlayerUI(); renderLyrics();
  if (isPlaying) setTimeout(speakCurrent, 200);
}

function prevItem() {
  stopSpeech();
  if (curItem > 0) {
    curItem--;
  } else if (curTrack > 0) {
    curTrack--; curItem = TRACKS[curTrack].items.length - 1;
  }
  updatePlayerUI(); renderLyrics();
  if (isPlaying) setTimeout(speakCurrent, 200);
}

function rewind() {
  stopSpeech();
  updatePlayerUI(); renderLyrics();
  if (isPlaying) setTimeout(speakCurrent, 200);
}

function restartTrack() {
  stopSpeech();
  curItem = 0;
  updatePlayerUI(); renderLyrics();
  if (isPlaying) setTimeout(speakCurrent, 200);
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('repeatBtn').style.opacity = isRepeat ? '1' : '0.4';
}

function toggleAuto() {
  isAuto = !isAuto;
  document.getElementById('autoBtn').classList.toggle('active', isAuto);
}

function toggleEnOnly() {
  isEnOnly = !isEnOnly;
  if (isEnOnly) { isShadow = false; document.getElementById('shadowBtn').classList.remove('active'); }
  document.getElementById('enOnlyBtn').classList.toggle('active', isEnOnly);
  if (isPlaying) { stopSpeech(); setTimeout(speakCurrent, 200); }
}

function toggleShadow() {
  isShadow = !isShadow;
  if (isShadow) { isEnOnly = false; document.getElementById('enOnlyBtn').classList.remove('active'); }
  document.getElementById('shadowBtn').classList.toggle('active', isShadow);
  // 활성화 시 안내 토스트
  if (isShadow) showToast('🎙 따라말하기 모드 ON — 영어 읽기 후 따라 말해보세요!');
  if (isPlaying) { stopSpeech(); setTimeout(speakCurrent, 200); }
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div'); t.id = 'toast';
    Object.assign(t.style, {
      position:'fixed', bottom:'calc(env(safe-area-inset-bottom,0px) + 80px)',
      left:'50%', transform:'translateX(-50%)',
      background:'#1E3A5F', border:'1px solid #3B82F6',
      color:'#93C5FD', fontSize:'13px', fontWeight:'600',
      padding:'10px 18px', borderRadius:'20px',
      zIndex:'9999', whiteSpace:'nowrap',
      boxShadow:'0 4px 20px rgba(0,0,0,0.5)',
      animation:'fadeUp 0.3s ease'
    });
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  speed = SPEEDS[speedIdx];
  document.getElementById('speedBadge').textContent = speed.toFixed(1) + 'x';
  if (isPlaying) { stopSpeech(); setTimeout(speakCurrent, 200); }
}

// ═══════════════════════════════════════════════════
// iOS: 화면 꺼짐 방지 (Wake Lock 대안)
// ═══════════════════════════════════════════════════
// iOS는 WakeLock API 미지원 — 오디오 재생 중에는 자동으로 화면 유지됨

// iOS audio session 활성화 (첫 터치 시)
let audioUnlocked = false;
document.addEventListener('touchend', () => {
  if (!audioUnlocked) {
    audioUnlocked = true;
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0;
    synth.speak(u);
  }
}, { once: true });

// ═══════════════════════════════════════════════════
// PWA 아이콘 생성

function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath();
  const g = ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,'#1D4ED8'); g.addColorStop(1,'#7C3AED');
  ctx.fillStyle = g; ctx.fill();
  ctx.font = `${size*0.5}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎧', size/2, size/2+size*0.04);
  return c.toDataURL('image/png');
}
['180','152','120'].forEach(s => {
  const el = document.getElementById(`icon-${s}`);
  if (el) el.href = makeIcon(+s);
});
